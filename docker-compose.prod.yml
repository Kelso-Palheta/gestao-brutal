version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: batatas_fritas_db_prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword # REDEFINA EM PRODUCAO
      POSTGRES_DB: batatasfritasdb
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: src/BatatasFritas.API/Dockerfile
    container_name: batatas_fritas_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Database=batatasfritasdb;Username=postgres;Password=mysecretpassword
    depends_on:
      - db
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: src/BatatasFritas.Web/Dockerfile
    container_name: batatas_fritas_web
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: batatas_fritas_proxy
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

volumes:
  postgres_data_prod:
  caddy_data:
  caddy_config:
