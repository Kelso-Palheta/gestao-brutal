version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: batatas_fritas_db_prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: batatasfritasdb
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: unless-stopped
    # Healthcheck: o DB só fica "ready" quando aceitar conexões
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: src/BatatasFritas.API/Dockerfile
    container_name: batatas_fritas_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - DatabaseProvider=postgres
      - ConnectionStrings__DefaultConnection=Host=db;Database=batatasfritasdb;Username=postgres;Password=mysecretpassword
      - Jwt__SecretKey=${Jwt__SecretKey:-CHANGE_ME_SET_IN_COOLIFY}
    ports:
      - "8080"
    depends_on:
      db:
        condition: service_healthy   # Só sobe APÓS o banco estar saudável
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: src/BatatasFritas.Web/Dockerfile
    container_name: batatas_fritas_web
    environment:
      - API_BASE_URL=${API_BASE_URL:-}  # URL da API injetada pelo Resfrie
    ports:
      - "80"
    restart: unless-stopped

volumes:
  postgres_data_prod: