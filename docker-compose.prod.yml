version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: batatas_fritas_db_prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword # REDEFINA EM PRODUCAO
      POSTGRES_DB: batatasfritasdb
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: src/BatatasFritas.API/Dockerfile
    container_name: batatas_fritas_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Database=batatasfritasdb;Username=postgres;Password=mysecretpassword
    depends_on:
      - db
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: src/BatatasFritas.Web/Dockerfile
    container_name: batatas_fritas_web
    restart: unless-stopped

volumes:
  postgres_data_prod:
