server {
    listen 80;

    include /etc/nginx/mime.types;

    # Garante que .wasm seja servido com o Content-Type correto
    types {
        application/wasm wasm;
    }

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=10s;

    # ── Blazor WASM: arquivos pré-comprimidos com Brotli ────────────────────
    # Blazor publica .br e .gz em Release; nginx precisa informar o Content-Encoding
    # para o browser descomprimir corretamente — sem isso → tela branca
    location ~* \.br$ {
        root /usr/share/nginx/html;
        add_header Content-Encoding br;
        add_header Vary Accept-Encoding;
        default_type application/octet-stream;
    }

    # ── Blazor WASM: arquivos pré-comprimidos com Gzip ───────────────────────
    location ~* \.gz$ {
        root /usr/share/nginx/html;
        add_header Content-Encoding gzip;
        add_header Vary Accept-Encoding;
        default_type application/octet-stream;
    }

    # ── Proxy: chamadas REST da API ──────────────────────────────────────────
    location /api/ {
        # Usa variável para o upstream forçar resolução em tempo de execução
        set $api_upstream http://api:8080;
        proxy_pass         $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Proxy: SignalR WebSocket ─────────────────────────────────────────────
    location /hubs/ {
        set $api_upstream http://api:8080;
        proxy_pass         $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ── Blazor WASM: arquivos estáticos (SPA fallback) ───────────────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html =404;
    }

    location /healthcheck {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /healthcheck.html;
    }
}
