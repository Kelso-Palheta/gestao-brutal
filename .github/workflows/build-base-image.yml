name: Build & Publish Blazor SDK Base Image

# Rebuild apenas quando a imagem base mudar, ou manualmente via workflow_dispatch
on:
  push:
    branches:
      - main
    paths:
      - 'docker/Dockerfile.blazor-sdk'
  workflow_dispatch: # Permite rebuild manual pelo GitHub UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kelso-palheta/blazor-sdk

jobs:
  build-and-push:
    name: Build and Push to ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Permissão para publicar no GitHub Container Registry

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=net8
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Blazor SDK base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.blazor-sdk
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache para acelerar rebuilds futuros da própria Action
          cache-from: type=gha
          cache-to: type=gha,mode=max
