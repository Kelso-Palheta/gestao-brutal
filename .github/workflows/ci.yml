name: CI — .NET Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore BatatasFritas.sln

      - name: Build
        run: dotnet build BatatasFritas.sln --configuration Release --no-restore

      - name: Test (Domain + Infrastructure)
        run: |
          dotnet test tests/BatatasFritas.Domain.Tests/BatatasFritas.Domain.Tests.csproj \
            --configuration Release --no-build --verbosity normal \
            --logger "trx;LogFileName=domain.trx"
          dotnet test tests/BatatasFritas.Infrastructure.Tests/BatatasFritas.Infrastructure.Tests.csproj \
            --configuration Release --no-build --verbosity normal \
            --logger "trx;LogFileName=infrastructure.trx"

      - name: Test API (TestContainers — requires Docker)
        run: |
          dotnet test tests/BatatasFritas.API.Tests/BatatasFritas.API.Tests.csproj \
            --configuration Release --no-build --verbosity normal \
            --logger "trx;LogFileName=api.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"
          retention-days: 7
